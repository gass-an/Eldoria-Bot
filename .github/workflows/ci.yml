name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/eldoria-bot

concurrency:
  group: eldoria-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  docker_build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: eldoria-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: release
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          awk "
            /^## \\[$VERSION\\]/ { found=1; print; next }
            /^## \\[/ && found { exit }
            found { print }
          " CHANGELOG.md > release_notes.md

          test -s release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Eldoria ${{ github.ref_name }}" \
            --notes-file release_notes.md

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: release
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd Bot_discord/Eldoria-Bot/
            sed -i "s/^APP_VERSION=.*/APP_VERSION=${{ github.ref_name }}/" .env
            docker compose pull
            docker compose up -d
            docker image prune -f